name: Xano PR CI

on:
  pull_request:
    branches: [main]
    paths:
      - xano/**
      - .github/actions/setup-xano-cli/**
      - .github/actions/xano-sandbox-gate/**
      - .github/scripts/**
      - .github/workflows/xano-*.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: xano-${{ github.repository }}
  cancel-in-progress: false

env:
  XANO_CODE_DIR: xano
  XANO_PROD_BRANCH: ${{ vars.XANO_PROD_BRANCH || 'v1' }}
  XANO_CLI_VERSION: ${{ vars.XANO_CLI_VERSION || 'latest' }}

jobs:
  preflight:
    name: Validate PR in the isolated sandbox
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xano CLI
        uses: ./.github/actions/setup-xano-cli
        with:
          instance-url: ${{ vars.XANO_INSTANCE_URL }}
          auth-token: ${{ secrets.XANO_AUTH }}
          workspace-id: ${{ vars.XANO_WORKSPACE_ID }}
          branch: ${{ env.XANO_PROD_BRANCH }}
          cli-version: ${{ env.XANO_CLI_VERSION }}

      # PRs are validated entirely in the sandbox. No real workspace branch is
      # created or pushed, so a PR can never affect production schema or data.
      - name: Sandbox gate
        uses: ./.github/actions/xano-sandbox-gate
        with:
          code-dir: ${{ env.XANO_CODE_DIR }}

      - name: Upload Xano test reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: xano-pr-ci-${{ github.run_id }}-${{ github.run_attempt }}
          path: reports/*.json
          if-no-files-found: ignore
