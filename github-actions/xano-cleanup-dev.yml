name: Cleanup Xano dev branch

on:
  delete:

concurrency:
  group: xano-deploy
  cancel-in-progress: false

jobs:
  cleanup:
    if: github.event.ref_type == 'branch' && startsWith(github.event.ref, 'dev-')
    runs-on: ubuntu-latest
    environment: xano
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configure Xano CLI profile
        env:
          XANO_AUTH: ${{ secrets.XANO_AUTH }}
        run: |
          npx -y @xano/cli profile create ci \
            -i "https://x49e-vhvt-vbqx.sales.xano.io" \
            -t "$XANO_AUTH" \
            -w 90 \
            -b v1 \
            --default

      - name: Sanitize branch name
        id: sanitize
        run: |
          RAW="${{ github.event.ref }}"
          SAFE=$(printf '%s' "$RAW" | tr '[:upper:]' '[:lower:]' | tr -c 'a-z0-9-' '-' | sed -E 's/-+/-/g; s/^-//; s/-$//')
          echo "branch=$SAFE" >> "$GITHUB_OUTPUT"

      - name: Delete Xano branch
        run: npx -y @xano/cli branch delete "${{ steps.sanitize.outputs.branch }}" --force
