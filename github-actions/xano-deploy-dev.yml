name: Deploy to Xano (dev branches)

on:
  push:
    branches: ['dev-*']
  workflow_dispatch:

concurrency:
  group: xano-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: xano
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configure Xano CLI profile
        env:
          XANO_AUTH: ${{ secrets.XANO_AUTH }}
        run: |
          npx -y @xano/cli profile create ci \
            -i "https://x49e-vhvt-vbqx.sales.xano.io" \
            -t "$XANO_AUTH" \
            -w 90 \
            -b v1 \
            --default

      - name: Sanitize branch name
        id: sanitize
        run: |
          RAW="${{ github.ref_name }}"
          SAFE=$(printf '%s' "$RAW" | tr '[:upper:]' '[:lower:]' | tr -c 'a-z0-9-' '-' | sed -E 's/-+/-/g; s/^-//; s/-$//')
          echo "branch=$SAFE" >> "$GITHUB_OUTPUT"

      - name: Ensure Xano branch exists
        run: |
          BRANCH="${{ steps.sanitize.outputs.branch }}"
          if npx -y @xano/cli branch get "$BRANCH" > /dev/null 2>&1; then
            echo "Branch $BRANCH already exists"
          else
            npx -y @xano/cli branch create "$BRANCH" --source v1 -d "Auto-created from GitHub branch ${{ github.ref_name }}"
          fi

      - name: Push to feature branch
        run: npx -y @xano/cli workspace push --sync --delete --force --branch "${{ steps.sanitize.outputs.branch }}"

      - name: Run unit tests on feature branch
        run: npx -y @xano/cli unit_test run_all --branch "${{ steps.sanitize.outputs.branch }}"
